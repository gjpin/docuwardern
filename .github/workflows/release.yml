name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (for example, v1.0.0)
        required: true
        type: string
      prerelease:
        description: Mark the release as a prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Test
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: go test ./...
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          extension=""
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o "dist/docuwarden-${GOOS}-${GOARCH}${extension}" \
            ./cmd/docuwarden
      - uses: actions/upload-artifact@v7
        with:
          name: docuwarden-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: docuwarden-*
          path: dist
          merge-multiple: true
      - name: Create checksums
        working-directory: dist
        run: sha256sum docuwarden-* > checksums.txt
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          prerelease_flag=""
          if [ "$PRERELEASE" = "true" ]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "$TAG" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --generate-notes \
            --title "$TAG" \
            $prerelease_flag
